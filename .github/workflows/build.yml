name: Build PuzzleBot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore puzzlebot.keystore \
            -alias puzzlebot \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass puzzlebot123 \
            -keypass puzzlebot123 \
            -dname "CN=PuzzleBot, OU=App, O=PuzzleBot, L=City, S=State, C=US"

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/puzzlebot.keystore \
            -Pandroid.injected.signing.store.password=puzzlebot123 \
            -Pandroid.injected.signing.key.alias=puzzlebot \
            -Pandroid.injected.signing.key.password=puzzlebot123 \
            --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PuzzleBot-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
